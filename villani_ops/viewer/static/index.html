<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Villani Ops Run Inspector</title><style>
:root{--bg:#05070b;--panel:#0c121b;--panel2:#111927;--line:#253244;--text:#eef4ff;--muted:#96a3b4;--accent:#8b7cf6;--blue:#5fb3ff;--green:#59d98e;--warn:#f3c969;--bad:#ff6b7a}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#0b1020,#05070b 45%);color:var(--text);font:13px/1.35 Inter,system-ui,sans-serif}.wrap{max-width:1500px;margin:auto;padding:14px}.top{display:grid;grid-template-columns:1.4fr repeat(5,auto);gap:10px;align-items:center;background:#090e16;border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:12px}.brand{font-size:18px;font-weight:750}.pill{border:1px solid var(--line);border-radius:999px;padding:6px 10px;background:#0e1622;color:var(--muted)}.pill b{color:var(--text)}.layout{display:grid;grid-template-columns:minmax(360px,38%) 1fr;gap:12px}.panel{background:linear-gradient(180deg,var(--panel),#080c12);border:1px solid var(--line);border-radius:14px;padding:14px;min-height:330px;overflow:hidden}h2{margin:0 0 3px;font-size:15px}.sub{color:var(--muted);font-size:12px}.timeline{margin-top:12px;max-height:380px;overflow:auto}.timeline-rail{}.timeline-dot{}.timeline-row{display:grid;grid-template-columns:76px 1fr;gap:8px;border:1px solid transparent;border-radius:10px;padding:8px;cursor:pointer}.timeline-row:hover,.timeline-row.selected{background:#151f31;border-color:#415479}.timeline-time{color:var(--muted);font-size:11px}.etype{font-weight:700}.status{font-size:11px;border-radius:99px;padding:2px 7px;border:1px solid var(--line);color:var(--muted)}.status.completed,.status.accepted,.status.selected{color:var(--green);border-color:#2f6b4a}.status.running{color:var(--blue);border-color:#346287}.status.failed,.status.rejected{color:var(--bad);border-color:#75404a}.graph{position:relative;height:380px;margin-top:12px;overflow:auto;background:#070b12;border-radius:12px}.graphInner{position:relative;min-width:1080px;min-height:360px}.edges{position:absolute;inset:0;pointer-events:none;overflow:visible}.node{position:absolute;width:150px;min-height:64px;border:1px solid #3a4860;border-radius:12px;background:#101826;padding:10px;cursor:pointer}.node.selected{outline:2px solid var(--accent);box-shadow:0 0 0 4px #8b7cf622}.node.running{border-color:var(--blue)}.node.completed,.node.selected.statusok{border-color:#3d7d57}.node.failed{border-color:#8a4650}.nlabel{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.nsub{margin-top:6px;color:var(--muted);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.inspector{margin-top:12px;min-height:270px}.tabs{display:flex;gap:6px;margin:12px 0}.tab{border:1px solid var(--line);border-radius:9px;background:#0b121d;color:var(--muted);padding:7px 10px;cursor:pointer}.tab.active{background:#1b2540;color:var(--text);border-color:var(--accent)}.kv{display:grid;grid-template-columns:170px 1fr;gap:7px 12px}.k{color:var(--muted)}pre{margin:0;white-space:pre-wrap;max-height:210px;overflow:auto;background:#05080e;border:1px solid var(--line);border-radius:10px;padding:10px}.artifact{display:flex;justify-content:space-between;border-bottom:1px solid #1d2737;padding:7px 0}.unavail{color:var(--muted)}.final{white-space:pre-wrap}.empty{color:var(--muted);padding:18px;text-align:center}@media(max-width:1000px){.top,.layout{grid-template-columns:1fr}.graph{height:520px}}
</style></head><body><div class="wrap"><div class="top"><div class="brand">Villani Ops · Single Run Inspector <span id="live" class="status running">LIVE</span></div><div class="pill">Run <b id="runid">—</b></div><div class="pill">Status <b id="rstatus">—</b></div><div class="pill">Mode <b id="mode">—</b></div><div class="pill">Backend <b id="backend">—</b></div><div class="pill">Cost <b id="cost">—</b> · Tokens <b id="tokens">—</b></div></div><div class="layout"><section class="panel"><h2>Event timeline</h2><div class="sub">Clickable runtime events for this run</div><div class="timeline" id="timeline"></div></section><section class="panel"><h2>Execution graph</h2><div class="sub">Clickable orchestrator stages and candidates</div><div class="graph" id="graph"><div class="graphInner" id="graphInner"><svg class="edges" id="edges"></svg></div></div></section></div><section class="panel inspector"><h2 id="inspectorTitle">Inspector</h2><div class="sub" id="inspectorSub">Select a timeline event or graph node.</div><div class="tabs" id="tabs"></div><div id="inspectorBody"></div></section></div><script>
const embedded=document.getElementById('villani-run-snapshot');let snapshot=embedded&&embedded.textContent.trim()?JSON.parse(embedded.textContent):null;let live=!snapshot;let selected=null,activeTab='Summary',debugTimer=null;const $=id=>document.getElementById(id);const tabs=['Summary','Evidence','Artifacts','Logs','Diff','Raw'];function formatInteger(n){return Number.isFinite(Number(n))?Number(n).toLocaleString():'unavailable'}function formatCompact(n){return Number.isFinite(Number(n))?Intl.NumberFormat(undefined,{notation:'compact'}).format(Number(n)):'unavailable'}function formatCost(n){return Number.isFinite(Number(n))&&Number(n)>0?'$'+Number(n).toFixed(4):'unavailable'}function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function time(t){try{return new Date(t).toLocaleTimeString()}catch(e){return '—'}}function detailFor(sel){if(!sel)return null;let [kind,id]=sel.split(':');return (((snapshot.details||{})[kind+'s']||{})[id])||null}function candidateId(d){return d&&d.related_ids&&(d.related_ids.candidate_id||d.related_ids.attempt_id)}function renderTop(){let r=snapshot.run||{},u=snapshot.usage||{};$('runid').textContent=r.run_id_short||r.run_id||'—';$('rstatus').textContent=r.status||'unknown';$('mode').textContent=r.mode||'—';$('backend').textContent=r.model||r.runner||'—';$('cost').textContent=formatCost(u.total_cost);$('tokens').textContent=formatCompact(u.total_tokens);$('live').textContent=live?'LIVE':'SNAPSHOT'}function select(kind,id){selected=kind+':'+id;activeTab='Summary';renderSelection();let d=detailFor(selected),cid=candidateId(d);if(debugTimer)clearTimeout(debugTimer);if(cid&&String(d.status).match(/running|started/i))pollDebug(cid);}
function renderTimeline(){let el=$('timeline');el.innerHTML=(snapshot.timeline||[]).map(e=>`<div class="timeline-row ${selected=='event:'+e.id?'selected':''}" onclick="select('event','${esc(e.id)}')"><div class="timeline-time">${time(e.timestamp)}</div><div><span class="status ${esc(e.status)}">${esc(e.status||'')}</span><div class="etype">${esc(e.title||e.type)}</div><div class="sub">${esc(e.subtitle||e.attempt_id||e.subtask_id||'')}</div></div></div>`).join('')||'<div class="empty">Waiting for events…</div>'}
function elbowPath(x1,y1,x2,y2){const m=x1+Math.max(35,(x2-x1)/2);return `M ${x1} ${y1} H ${m} V ${y2} H ${x2}`}function renderGraph(){const g=snapshot.graph||{nodes:[],edges:[]},inner=$('graphInner'),svg=$('edges');inner.querySelectorAll('.node').forEach(n=>n.remove());let cw=190,rh=105,p=24,maxC=1,maxR=1;(g.nodes||[]).forEach(n=>{maxC=Math.max(maxC,n.col||1);maxR=Math.max(maxR,n.row||1)});let w=p*2+maxC*cw,h=p*2+maxR*rh;inner.style.width=w+'px';inner.style.height=h+'px';for(const n of g.nodes||[]){let d=document.createElement('div');d.className='node '+(n.status||'')+(selected=='node:'+n.id?' selected':'');d.style.left=(p+((n.col||1)-1)*cw)+'px';d.style.top=(p+((n.row||1)-1)*rh)+'px';d.innerHTML=`<div class="nlabel">${esc(n.label||n.id)}</div><div class="nsub">${esc(n.subtitle||n.status||'')}</div>`;d.onclick=()=>select('node',n.id);inner.appendChild(d)}svg.innerHTML='';svg.setAttribute('width',w);svg.setAttribute('height',h);requestAnimationFrame(()=>{let gb=inner.getBoundingClientRect();for(const e of g.edges||[]){let a=[...inner.querySelectorAll('.node')].find(x=>x.style.left==(p+((g.nodes.find(n=>n.id==e.source)||{}).col-1)*cw+'px'));let b=[...inner.querySelectorAll('.node')].find(x=>x.style.left==(p+((g.nodes.find(n=>n.id==e.target)||{}).col-1)*cw+'px'));if(!a||!b)continue;let ar=a.getBoundingClientRect(),br=b.getBoundingClientRect(),path=document.createElementNS('http://www.w3.org/2000/svg','path');path.setAttribute('d',elbowPath(ar.right-gb.left,ar.top+ar.height/2-gb.top,br.left-gb.left,br.top+br.height/2-gb.top));path.setAttribute('stroke','#526073');path.setAttribute('fill','none');svg.appendChild(path)}})}
function renderSelection(){renderTimeline();renderGraph();let d=detailFor(selected);$('tabs').innerHTML=tabs.map(t=>`<button class="tab ${activeTab==t?'active':''}" onclick="activeTab='${t}';renderSelection()">${t}</button>`).join('');if(!d){$('inspectorTitle').textContent='Inspector';$('inspectorSub').textContent='Select a timeline event or graph node.';$('inspectorBody').innerHTML='';return}$('inspectorTitle').textContent=d.title||d.id;$('inspectorSub').textContent=(d.type||'item')+' · '+(d.status||'unknown');let html='';if(activeTab=='Summary'){let h=d.human||{};html=`<div class="kv"><div class="k">Title</div><div>${esc(d.title)}</div><div class="k">Type</div><div>${esc(d.type)}</div><div class="k">Status</div><div>${esc(d.status)}</div><div class="k">Timestamp</div><div>${esc(d.timestamp||'—')}</div><div class="k">What happened</div><div>${esc(h.what_happened||d.summary)}</div><div class="k">Why it matters</div><div>${esc(h.why_it_matters||'—')}</div><div class="k">Next action</div><div>${esc(h.next_action||'—')}</div><div class="k">Related ids</div><div><pre>${esc(JSON.stringify(d.related_ids||{},null,2))}</pre></div></div>`}else if(activeTab=='Evidence'){html='<pre>'+esc(JSON.stringify(d.evidence||{},null,2))+'</pre>'}else if(activeTab=='Artifacts'){let a=d.artifacts||[];html=a.length?a.map(x=>`<div class="artifact"><span>${esc(x.label||x.id)}</span><span class="${x.available?'':'unavail'}">${esc(x.available?x.path:'Unavailable')}</span></div>`).join(''):'<div class="empty">Unavailable</div>'}else if(activeTab=='Logs'){html=(d.logs||[]).length?'<pre>'+esc(JSON.stringify(d.logs.slice(-100),null,2))+'</pre>':'<div class="empty">No related logs available</div>'}else if(activeTab=='Diff'){let diff=d.diff&&d.diff.excerpt;html=diff?'<pre>'+esc(diff)+'</pre>':'<div class="empty">No diff available</div>'}else html='<pre>'+esc(JSON.stringify(d.raw||d,null,2))+'</pre>';$('inspectorBody').innerHTML=html}
async function pollDebug(cid){try{let m=location.pathname.match(/\/runs\/([^/]+)/);if(!m)return;let r=await fetch(`/api/runs/${m[1]}/candidate/${cid}/debug`,{cache:'no-store'});if(r.ok){let dbg=await r.json();let d=detailFor(selected);if(d){d.logs=dbg.latest_events||[];d.evidence=Object.assign({},d.evidence||{},{live_debug:dbg});if(activeTab=='Logs'||activeTab=='Evidence')renderSelection();}}}catch(e){}debugTimer=setTimeout(()=>pollDebug(cid),1500)}
function render(s){snapshot=s||snapshot||{};renderTop();renderTimeline();renderGraph();if(!selected){let first=(snapshot.timeline||[])[0];if(first)selected='event:'+first.id}renderSelection()}async function poll(){if(!live)return;let m=location.pathname.match(/\/runs\/([^/]+)/);if(!m)return;try{let r=await fetch(`/api/runs/${m[1]}/snapshot`,{cache:'no-store'});if(r.ok)render(await r.json())}catch(e){$('live').textContent='OFFLINE'}setTimeout(poll,1000)}if(snapshot)render(snapshot);else poll();
</script></body></html>
