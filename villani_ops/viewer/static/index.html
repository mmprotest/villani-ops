<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Villani Ops Viewer</title><style>
:root{--bg:#030507;--panel:#0b1116e8;--panel2:#0e151be8;--line:#1e2a32;--line2:#31414b;--text:#eef2f4;--muted:#8e9aa3;--green:#8bcf91;--bad:#c97878;--warn:#c7ad6f;--nodew:166px;--nodeh:82px}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 50% -10%,#172229 0,#080d11 42%,var(--bg) 76%);color:var(--text);font:14px/1.45 Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-feature-settings:"tnum"}.wrap{padding:20px 24px 28px;max-width:1600px;margin:auto}.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:20px}.brand{display:flex;gap:13px;align-items:center;font-size:27px;font-weight:700;letter-spacing:-.03em}.v{width:40px;height:30px;background:linear-gradient(135deg,#fff,#a4adb3);clip-path:polygon(0 0,25% 0,48% 64%,74% 0,100% 0,62% 100%,38% 100%)}.badge{border:1px solid #29413a;border-radius:999px;padding:5px 10px;font-size:11px;color:var(--green);background:#07110e;letter-spacing:.08em}.actions{display:flex;gap:12px;align-items:center}.btn,.progress{border:1px solid var(--line);border-radius:12px;padding:11px 16px;background:#070c10;color:var(--text);box-shadow:0 10px 28px #0005}.progress{min-width:270px}.progressTop{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:8px}.bar{height:6px;border-radius:99px;background:#1a242b;overflow:hidden}.fill{height:100%;width:0;background:linear-gradient(90deg,#6ca772,var(--green));transition:width .7s ease}.cards{display:grid;grid-template-columns:1.35fr .95fr .8fr 1.35fr .85fr .75fr .85fr 1.05fr;gap:10px;margin-bottom:14px}.card,.panel{background:linear-gradient(180deg,var(--panel),#080d11e8);border:1px solid #1a2630;border-radius:16px;box-shadow:0 12px 34px #0008}.card{min-height:112px;padding:16px;overflow:hidden}.label{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.09em}.value{font-size:19px;margin-top:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.sub{color:var(--muted);font-size:12px;margin-top:6px;overflow:hidden;text-overflow:ellipsis}.tag{display:inline-block;border:1px solid var(--line2);border-radius:999px;padding:2px 7px;margin-left:6px;color:#c7d0d5;font-size:11px}.green{color:var(--green)}.bad{color:var(--bad)}.grid{display:grid;grid-template-columns:minmax(420px,39%) minmax(680px,61%);gap:14px}.panel{padding:22px;min-height:628px;position:relative;overflow:hidden}.panel h2{font-size:18px;margin:0 0 2px;letter-spacing:-.01em}.timeline{margin-top:18px;max-height:535px;overflow:auto;padding-right:4px}.timeline-row{display:grid;grid-template-columns:88px 28px 1fr;gap:12px;align-items:stretch;min-height:70px;animation:fadeSlideIn .35s ease both}.timeline-time{color:#8e99a2;font-size:12px;padding-top:14px}.timeline-rail{position:relative;display:flex;justify-content:center}.timeline-rail:before{content:"";position:absolute;top:0;bottom:0;width:1px;background:#26343d}.timeline-dot{z-index:1;margin-top:13px;width:15px;height:15px;border-radius:99px;border:2px solid #60707a;background:#0b1116}.timeline-dot.completed,.timeline-dot.accepted,.timeline-dot.selected{background:var(--green);border-color:var(--green);box-shadow:0 0 0 4px #8bcf9114}.timeline-dot.running{border-color:var(--green);animation:pulse 1.8s infinite}.timeline-dot.failed,.timeline-dot.rejected{background:var(--bad);border-color:var(--bad)}.timeline-card{margin-bottom:10px;border:1px solid #1d2a33;border-radius:13px;background:#0d141acc;padding:12px 14px;display:flex;justify-content:space-between;gap:12px;transition:border-color .35s,background .35s,transform .35s}.timeline-card.active{border-color:#5c7665;box-shadow:0 0 0 1px #8bcf9120}.etype{font-weight:650}.duration{color:var(--green);font-size:12px;white-space:nowrap}.graph{position:relative;height:535px;margin-top:18px;overflow:auto;border-radius:14px;background:linear-gradient(180deg,#070b0f44,#05080b22)}.graphInner{position:relative;min-width:960px;min-height:520px}.edges{position:absolute;inset:0;pointer-events:none;overflow:visible}.node{position:absolute;width:var(--nodew);min-height:var(--nodeh);border:1px solid #3b4a53;border-radius:14px;background:linear-gradient(180deg,#111a20f2,#0a1015f2);padding:14px 14px;transition:transform .35s,border-color .35s,background .35s,opacity .35s;box-shadow:0 12px 24px #0007}.node.pending{border-style:dashed;opacity:.48}.node.running{border-color:#78947c;box-shadow:0 0 0 3px #8bcf9114,0 12px 24px #0007}.node.completed,.node.accepted,.node.selected{border-color:#58745e}.node.failed,.node.rejected{border-color:#8f5555}.nlabel{font-size:15px;font-weight:650;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.nsub{font-size:11px;color:var(--muted);margin-top:8px;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.check{float:right;color:var(--green)}.legend{position:absolute;right:22px;bottom:18px;border:1px solid var(--line);border-radius:12px;padding:11px 14px;background:#070c10d9;display:flex;gap:14px;color:var(--muted);font-size:12px}.final{margin-top:14px;padding:14px;border:1px solid var(--line);border-radius:12px;background:#070c10;white-space:pre-wrap}.empty{color:var(--muted);padding:30px;text-align:center}@keyframes fadeSlideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}@keyframes pulse{0%{box-shadow:0 0 0 0 #8bcf9145}70%{box-shadow:0 0 0 8px #8bcf9100}100%{box-shadow:0 0 0 0 #8bcf9100}}@media(prefers-reduced-motion:reduce){*,*:before,*:after{animation:none!important;transition:none!important}}@media(max-width:1200px){.cards,.grid{grid-template-columns:1fr}.panel{min-height:0}.graph{height:680px}}
</style></head><body><div class="wrap"><div class="top"><div class="brand"><i class="v"></i>Villani Ops <span id="live" class="badge">OFFLINE</span></div><div class="actions"><div class="progress"><div class="progressTop"><span id="plabel">Run Progress</span><b id="pct">—</b></div><div class="bar"><div class="fill" id="fill"></div></div></div><button class="btn" onclick="window.location.href='.'">Open in Console ↗</button></div></div><div class="cards" id="cards"></div><div class="grid"><section class="panel"><h2>Live Event Timeline</h2><div class="sub">Real-time orchestration events</div><div class="timeline" id="timeline"></div><div id="final" class="final" style="display:none"></div></section><section class="panel"><h2>Execution Graph</h2><div class="sub">Staged orchestration flow</div><div class="graph" id="graph"><div class="graphInner" id="graphInner"><svg class="edges" id="edges"></svg></div></div><div class="legend"><span>● Completed</span><span>○ Running</span><span>◌ Pending</span><span class="green">● Live Updates</span></div></section></div></div><script>
const embedded=document.getElementById('villani-run-snapshot');let snapshot=embedded&&embedded.textContent.trim()?JSON.parse(embedded.textContent):null;let live=!snapshot;const $=id=>document.getElementById(id);let atTimelineBottom=true;function formatInteger(n){return Number.isFinite(Number(n))?Number(n).toLocaleString():'unavailable'}function formatCompact(n){return Number.isFinite(Number(n))?Intl.NumberFormat(undefined,{notation:'compact'}).format(Number(n)):'unavailable'}function formatCost(n){return Number.isFinite(Number(n))&&Number(n)>0?'$'+Number(n).toFixed(4):'unavailable'}function dur(s){if(s==null)return 'unavailable';s=Math.round(s);return String(Math.floor(s/3600)).padStart(2,'0')+':'+String(Math.floor(s/60)%60).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}function time(t){try{return new Date(t).toLocaleTimeString()}catch(e){return '—'}}function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function shortModel(m){m=String(m||'');let b=m.split('/').pop();return b.replace(/\.gguf$/i,'')||'Model unavailable'}
function card(label,value,sub,title=''){return `<div class="card" title="${esc(title||value)}"><div class="label">${esc(label)}</div><div class="value ${label=='Status'?(String(value).match(/fail|reject/i)?'bad':'green'):''}">${esc(value)}</div><div class="sub">${sub}</div></div>`}
function render(s){snapshot=s||snapshot||{};let r=snapshot.run||{},u=snapshot.usage||{};let pct=Math.max(0,Math.min(100,Number(r.progress_percent||0)));$('live').textContent=live&&!String(r.status).match(/completed|failed|accepted|rejected/i)?'LIVE':'OFFLINE SNAPSHOT';$('pct').textContent=pct+'%';$('plabel').textContent=r.progress_label||'Run Progress';$('fill').style.width=pct+'%';let tok=u.total_tokens?`Input: ${formatInteger(u.input_tokens)}<br>Output: ${formatInteger(u.output_tokens)}<br>Total: ${formatInteger(u.total_tokens)}`:'Tokens unavailable';let cost=u.total_cost?formatCost(u.total_cost):'Cost unavailable';let costSub=u.unavailable_calls_count?`${u.unavailable_calls_count} unavailable calls`:'';let model=r.model?shortModel(r.model):'Model unavailable';let cards=[card('Task',r.task||'Task unavailable',`<span class="tag">${esc(r.mode||'mode unavailable')}</span>`),card('Model',model,'',r.model||''),card('Runner',r.runner||'Runner unavailable',''),card('Tokens',u.total_tokens?formatCompact(u.total_tokens):'unavailable',tok),card('Cost',cost,costSub),card('Status',r.status||'unknown',''),card('Duration',dur(r.duration_seconds),r.started_at?('Started '+time(r.started_at)):''),card('Run ID',r.run_id_short||r.run_id||'Run unavailable',esc(r.run_dir_short||''),r.run_dir||r.run_id||'')];$('cards').innerHTML=cards.join('');renderTimeline(snapshot.timeline||[]);if(r.result){$('final').style.display='block';$('final').textContent='Final result\n'+JSON.stringify(r.result,null,2)}renderGraph(snapshot.graph||{nodes:[],edges:[]})}
function renderTimeline(tl){let el=$('timeline');atTimelineBottom=el.scrollTop+el.clientHeight>=el.scrollHeight-24;el.innerHTML=tl.length?tl.map(e=>`<div class="timeline-row"><div class="timeline-time">${time(e.timestamp)}</div><div class="timeline-rail"><div class="timeline-dot ${esc(e.status)}"></div></div><div class="timeline-card ${e.status=='running'?'active':''}"><div><div class="etype">${esc(e.title)}</div><div class="sub">${esc(e.subtitle||'')}</div></div><div class="duration">${e.duration_seconds?esc(e.duration_seconds+'s'):''}</div></div></div>`).join(''):'<div class="empty">Waiting for events…</div>';if(atTimelineBottom)el.scrollTop=el.scrollHeight}
function elbowPath(x1,y1,x2,y2){const midX=(x1+x2)/2;return `M ${x1} ${y1} C ${midX} ${y1}, ${midX} ${y2}, ${x2} ${y2}`}
function renderGraph(g){const graph=$('graphInner'),svg=$('edges');graph.querySelectorAll('.node').forEach(n=>n.remove());const cw=222,rh=128,pad=26;let maxCol=1,maxRow=1;(g.nodes||[]).forEach(n=>{maxCol=Math.max(maxCol,n.col||1);maxRow=Math.max(maxRow,n.row||1)});graph.style.minWidth=(pad*2+maxCol*cw+170)+'px';graph.style.minHeight=(pad*2+maxRow*rh+110)+'px';(g.nodes||[]).forEach(n=>{let d=document.createElement('div');d.className='node '+(n.status||'pending');d.style.left=(pad+((n.col||1)-1)*cw)+'px';d.style.top=(pad+((n.row||1)-1)*rh)+'px';d.dataset.id=n.id;let done=String(n.status).match(/completed|accepted|selected/)?'<span class="check">✓</span>':'';d.innerHTML=`${done}<div class="nlabel" title="${esc(n.label||n.id)}">${esc(n.label||n.id)}</div><div class="nsub" title="${esc(n.subtitle||n.status||'')}">${esc(n.subtitle||n.status||'')}</div>`;graph.appendChild(d)});setTimeout(()=>{let box=graph.getBoundingClientRect();svg.setAttribute('width',graph.scrollWidth);svg.setAttribute('height',graph.scrollHeight);svg.innerHTML=(g.edges||[]).map(e=>{let a=graph.querySelector(`[data-id="${CSS.escape(e.source)}"]`),b=graph.querySelector(`[data-id="${CSS.escape(e.target)}"]`);if(!a||!b)return '';let ar=a.getBoundingClientRect(),br=b.getBoundingClientRect(),x1=ar.right-box.left,y1=ar.top+ar.height/2-box.top,x2=br.left-box.left,y2=br.top+br.height/2-box.top,st=e.status||'active',color=st=='pending'?'#4f5d66':(st=='failed'?'#8f5555':'#82909a'),dash=st=='pending'?' stroke-dasharray="6 6"':'';return `<path d="${elbowPath(x1,y1,x2,y2)}" fill="none" stroke="${color}" stroke-width="1.5" opacity=".62"${dash}/>`}).join('')},0)}
async function poll(){if(!live)return;let m=location.pathname.match(/\/runs\/([^/]+)/);if(!m)return;try{let r=await fetch(`/api/runs/${m[1]}/snapshot`,{cache:'no-store'});if(r.ok)render(await r.json())}catch(e){}setTimeout(poll,1000)}if(snapshot)render(snapshot);else poll();
</script></body></html>
