const embedded=document.getElementById('villani-run-snapshot');let snapshot=embedded&&embedded.textContent.trim()?JSON.parse(embedded.textContent):null;let live=!snapshot;const $=id=>document.getElementById(id);let atTimelineBottom=true;const timelineNodes=new Map();const graphNodes=new Map();const graphEdges=new Map();function formatInteger(n){return Number.isFinite(Number(n))?Number(n).toLocaleString():'unavailable'}function formatCompact(n){return Number.isFinite(Number(n))?Intl.NumberFormat(undefined,{notation:'compact'}).format(Number(n)):'unavailable'}function formatCost(n){return Number.isFinite(Number(n))&&Number(n)>0?'$'+Number(n).toFixed(4):'unavailable'}function dur(s){if(s==null)return 'unavailable';s=Math.round(s);return String(Math.floor(s/3600)).padStart(2,'0')+':'+String(Math.floor(s/60)%60).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}function time(t){try{return new Date(t).toLocaleTimeString()}catch(e){return '—'}}function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function shortModel(m){m=String(m||'');let b=m.split('/').pop();return b.replace(/\.gguf$/i,'')||'Model unavailable'}

function decisionItem(label,value){return `<div class="card" style="min-height:86px"><div class="label">${esc(label)}</div><div class="value" style="white-space:normal">${esc(value||'Unavailable')}</div></div>`}
function renderDecision(d,r){d=d||{};$('decisionSummary').innerHTML=[decisionItem('Decision',d.label),decisionItem('Winner',d.winner||'none'),decisionItem('Selection basis',d.selection_basis),decisionItem('Runner',d.runner_status),decisionItem('Review',d.review_status),decisionItem('Validation',d.validation_status),decisionItem('Changed files',`${d.changed_files_count||0}: ${(d.changed_files||[]).join(', ')||'none'}`),decisionItem('Reason',d.failure_reason||d.next_step||'—')].join('');$('decisionWarnings').style.display=(d.warnings||[]).length?'block':'none';$('decisionWarnings').textContent=(d.warnings||[]).join(' ');$('rawFinal').textContent=JSON.stringify(r.result||d,null,2)}
function renderEvidence(rows){if(!rows||!rows.length){$('candidateEvidence').innerHTML='<div class="empty">No candidate evidence available.</div>';return}let html='<table><thead><tr><th>Candidate</th><th>Status</th><th>Patch</th><th>Changed files</th><th>Runner</th><th>Review</th><th>Validation</th><th>Eligibility</th><th>Warnings/blockers</th></tr></thead><tbody>';for(const c of rows){html+=`<tr><td>${esc(c.candidate_id)} ${c.selected?'<span class="tag green">Selected winner</span>':''}</td><td>${esc(c.status)}</td><td>${esc(c.patch)}</td><td>${esc((c.changed_files||[]).join(', ')||'Unavailable')}</td><td>${esc(c.runner_status)}</td><td>${esc(c.review_status)}</td><td>${esc(c.validation_status)}</td><td>${c.eligible?'Eligible':'Not eligible'}</td><td>${esc((c.blockers||[]).join('; ')||'None')}</td></tr>`}html+='</tbody></table>';$('candidateEvidence').innerHTML=html}
function render(s){snapshot=s||snapshot||{};let r=snapshot.run||{},u=snapshot.usage||{};let pct=Math.max(0,Math.min(100,Number(r.progress_percent||0)));let terminal=String(r.status).match(/completed|failed|accepted|rejected/i)||pct>=100;$('live').textContent=terminal?'FINAL SNAPSHOT':(live?'LIVE':'OFFLINE');$('pct').textContent=pct+'%';$('plabel').textContent=r.progress_label||'Run Progress';$('fill').style.width=pct+'%';let hasTok=Number(u.total_tokens||u.input_tokens||u.output_tokens)>0;let tok=hasTok?`Input: ${formatCompact(u.input_tokens)}<br>Output: ${formatCompact(u.output_tokens)}<br>Total: ${formatCompact(u.total_tokens)}`:'Unavailable';let c=u.cost||{};let cstatus=c.status||'unavailable';let cost=cstatus=='zero'?'$0.00':(Number(c.amount||u.total_cost)>0?((cstatus=='partial'?'Partial ':'')+(cstatus=='estimated'?'Estimated ':'')+formatCost(c.amount||u.total_cost)):'Unavailable');let costSub=[c.reason, (u.unavailable_calls_count?`${u.unavailable_calls_count} unavailable call${u.unavailable_calls_count==1?'':'s'}`:'' )].filter(Boolean).join('<br>');let model=r.model&&r.model!=='Unknown model'?shortModel(r.model):'Unknown model';let decision=snapshot.decision||{};let warns=(snapshot.warnings||[]).concat(snapshot.errors||[]);$('warningBanner').style.display=warns.length?'block':'none';$('warningBanner').textContent=warns.length?'Run finished, but some artifacts reported warnings: '+warns.join('; '):'';renderDecision(snapshot.decision||{},r);renderEvidence(snapshot.candidate_evidence||[]);let cards=[card('Task',r.task||'Task unavailable',`<span class="tag">${esc(r.mode||'mode unavailable')}</span>`,'',true),card('Decision',decision.label||r.status||'unknown',''),card('Winner',decision.winner||'none',''),card('Model',model,'',r.model||''),card('Backend',r.backend_name||'Unknown backend',r.backend_url?esc(r.backend_url):'',r.backend_url||r.backend_name||''),card('Runner',r.runner||'Runner unavailable',''),card('Run ID',r.run_id||'Run unavailable',esc(r.run_dir_short function createTimelineNode(e){let row=document.createElement('div');row.className='timeline-row is-new';row.dataset.id=e.id;row.innerHTML=`<div class="timeline-time"></div><div class="timeline-rail"><div class="timeline-dot"></div></div><div class="timeline-card"><div><div class="etype"></div><div class="sub"></div></div><div class="duration"></div></div>`;updateTimelineNode(row,e);setTimeout(()=>row.classList.remove('is-new'),450);return row}
function updateTimelineNode(row,e){row.querySelector('.timeline-time').textContent=time(e.timestamp);let dot=row.querySelector('.timeline-dot');dot.className='timeline-dot '+(e.status||'pending');let card=row.querySelector('.timeline-card');card.className='timeline-card '+(e.status=='running'?'active':'');row.querySelector('.etype').textContent=e.title||e.type||'Event';row.querySelector('.sub').textContent=e.subtitle||'';row.querySelector('.duration').textContent=e.duration_seconds?e.duration_seconds+'s':''}
function renderTimeline(tl){let el=$('timeline');let empty=el.querySelector('.empty');if(empty)empty.remove();const nearBottom=el.scrollHeight-el.scrollTop-el.clientHeight<48;if(!tl.length){if(!el.querySelector('.empty')){let d=document.createElement('div');d.className='empty';d.textContent='Waiting for events…';el.appendChild(d)}return}for(const e of tl){let key=e.id||e.event_id||e.type+'-'+e.timestamp;let existing=timelineNodes.get(key);if(existing){updateTimelineNode(existing,e)}else{let node=createTimelineNode({...e,id:key});el.appendChild(node);timelineNodes.set(key,node)}}if(nearBottom)el.scrollTop=el.scrollHeight}
function elbowPath(x1,y1,x2,y2){const midX=x1+Math.max(40,(x2-x1)/2);return `M ${x1} ${y1} H ${midX} V ${y2} H ${x2}`}
function renderGraph(g){$('graph').className='graph '+(g.kind=='provider_failure'?'providerFailureGraph':'tournamentGraph');const graph=$('graphInner'),svg=$('edges'),cw=(g.kind=='provider_failure'?260:285),rh=(g.kind=='provider_failure'?132:150),pad=22;let maxCol=1,maxRow=1;(g.nodes||[]).forEach(n=>{maxCol=Math.max(maxCol,n.col||1);maxRow=Math.max(maxRow,n.row||1)});let w=Math.max($('graph').clientWidth-8,pad*2+maxCol*cw+120),h=Math.max(g.kind=='provider_failure'?180:$('graph').clientHeight-8,pad*2+maxRow*rh+90);graph.style.width=w+'px';graph.style.height=h+'px';const box=$('graph').getBoundingClientRect(),scale=Math.min(1,(box.width-8)/w,(box.height-8)/h);graph.style.transform=`scale(${scale})`;graph.style.transformOrigin='top left';let seen=new Set();for(const n of (g.nodes||[])){seen.add(n.id);let d=graphNodes.get(n.id);if(!d){d=document.createElement('div');d.className='node';d.dataset.id=n.id;d.setAttribute('data-node-id',n.id);d.setAttribute('data-candidate-id',n.candidate_id||'');d.setAttribute('data-node-kind',n.kind||n.type||'');d.setAttribute('data-status',n.status||'');d.setAttribute('data-detail-json',JSON.stringify(n.details||n.children||n));d.innerHTML='<span class="check"></span><div class="nlabel"></div><div class="nsub"></div><div class="nodeBadge" style="display:none"></div>';d.setAttribute('role','button');d.tabIndex=0;graph.appendChild(d);graphNodes.set(n.id,d)}d.className='node '+(n.status||'pending');d.dataset.nodeId=n.id;d.dataset.candidateId=n.candidate_id||'';d.dataset.nodeKind=n.kind||n.type||'';d.dataset.status=n.status||'';d.dataset.detailJson=JSON.stringify(n.details||n.children||n);d.style.left=(pad+((n.col||1)-1)*cw)+'px';d.style.top=(pad+((n.row||1)-1)*rh)+'px';d.querySelector('.check').textContent=String(n.status).match(/completed|accepted|selected/)?'✓':'';d.querySelector('.nlabel').textContent=n.label||n.id;d.querySelector('.nlabel').title=n.label||n.id;d.querySelector('.nsub').textContent=n.subtitle||n.status||'';d.querySelector('.nsub').title=n.subtitle||n.status||'';let badge=d.querySelector('.nodeBadge');let bs=String(n.subtitle||n.status||'');let bt=n.badge||(String(n.status).match(/failed|rejected/)?'Failed':(bs.match(/winner/i)?'Winner':(bs.match(/warning|not run|missing/i)?'Warning':'')));badge.style.display=bt?'inline-block':'none';badge.className='nodeBadge '+(bt=='Winner'?'winner':bt=='Failed'?'failed':'warning');badge.textContent=bt;d.onclick=()=>{let gd=$('graphDetails');gd.style.display='block';gd.className='final graph-node-details';gd.dataset.nodeId=n.id;gd.textContent=(n.label||n.id)+'\n'+JSON.stringify(n.details||n.children||n,null,2)}}for(const [id,node] of graphNodes){if(!seen.has(id)){node.remove();graphNodes.delete(id)}}requestAnimationFrame(()=>{let gb=graph.getBoundingClientRect();svg.setAttribute('width',w);svg.setAttribute('height',h);svg.style.width=w+'px';svg.style.height=h+'px';let edgeSeen=new Set();for(const e of (g.edges||[])){let a=graphNodes.get(e.source),b=graphNodes.get(e.target);if(!a||!b)continue;let id=e.id||`edge_${e.source}_${e.target}`;edgeSeen.add(id);let path=graphEdges.get(id);if(!path){path=document.createElementNS('http://www.w3.org/2000/svg','path');path.setAttribute('fill','none');path.setAttribute('stroke-width','1.5');svg.appendChild(path);graphEdges.set(id,path)}let ar=a.getBoundingClientRect(),br=b.getBoundingClientRect(),x1=(ar.right-gb.left)/scale,y1=(ar.top+ar.height/2-gb.top)/scale,x2=(br.left-gb.left)/scale,y2=(br.top+br.height/2-gb.top)/scale,st=e.status||'active';path.setAttribute('d',elbowPath(x1,y1,x2,y2));path.setAttribute('stroke',st=='pending'?'#4f5d66':(st=='failed'?'#8f5555':'#82909a'));path.setAttribute('opacity',st=='pending'?'.42':'.66');if(st=='pending')path.setAttribute('stroke-dasharray','6 6');else path.removeAttribute('stroke-dasharray')}for(const [id,path] of graphEdges){if(!edgeSeen.has(id)){path.remove();graphEdges.delete(id)}}})}
