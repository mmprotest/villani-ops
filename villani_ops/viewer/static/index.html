<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Villani Ops Viewer</title><style>
:root{--bg:#03070a;--panel:#0b1217dd;--panel2:#0e171ddd;--line:#22303a;--text:#e8ecef;--muted:#8d98a1;--green:#94d68d;--bad:#e18383;--warn:#d4bd75}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 55% 10%,#102027 0,#071015 36%,#03070a 75%);color:var(--text);font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.wrap{padding:18px 22px 28px}.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}.brand{display:flex;gap:14px;align-items:center;font-size:28px;font-weight:650}.v{width:42px;height:30px;display:inline-block;background:linear-gradient(135deg,#fff,#99a2a8);clip-path:polygon(0 0,25% 0,48% 62%,74% 0,100% 0,62% 100%,38% 100%)}.badge{border:1px solid var(--line);border-radius:8px;padding:5px 9px;font-size:12px;color:var(--green);background:#081014}.actions{display:flex;gap:12px}.btn,.progress{border:1px solid var(--line);border-radius:9px;padding:11px 18px;background:#071015;color:var(--text)}.progress span{display:inline-block;width:110px;height:2px;background:linear-gradient(90deg,var(--green) 65%,#26343d 65%);vertical-align:middle;margin:0 12px}.cards{display:grid;grid-template-columns:1.25fr .9fr .9fr 1.6fr .9fr .75fr .8fr 1.1fr;gap:8px;margin-bottom:12px}.card,.panel{background:linear-gradient(180deg,var(--panel),#081016dd);border:1px solid #1a2a33;border-radius:10px;box-shadow:0 8px 30px #0008}.card{min-height:100px;padding:18px}.label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.08em}.value{font-size:20px;margin-top:14px}.sub{color:var(--muted);font-size:12px;margin-top:6px}.green{color:var(--green)}.grid{display:grid;grid-template-columns:39% 60%;gap:12px}.panel{padding:22px;min-height:620px;position:relative;overflow:hidden}.panel h2{font-size:18px;margin:0 0 2px}.timeline{margin-top:16px}.event{display:grid;grid-template-columns:92px 24px 1fr;gap:12px;align-items:center;margin:6px 0}.time{color:#9ba5ad}.dot{width:20px;height:20px;border-radius:99px;border:2px solid #9aa3a8;background:#101920}.dot.completed,.dot.accepted,.dot.selected{background:var(--green);border-color:var(--green)}.dot.failed,.dot.rejected{background:var(--bad);border-color:var(--bad)}.dot.running{box-shadow:0 0 0 3px #fff2}.eventbox{border:1px solid #1c2b34;border-radius:8px;background:#0d151bcc;padding:10px 14px;display:flex;justify-content:space-between}.eventbox.active{border-color:#7d8a91}.etype{font-weight:600}.graph{position:relative;height:500px;margin-top:18px}.node{position:absolute;width:155px;min-height:92px;border:1px solid #53616a;border-radius:9px;background:linear-gradient(180deg,#111b22dd,#0a1116dd);padding:18px 16px}.node.pending{border-style:dashed;opacity:.55}.node.running{box-shadow:0 0 0 2px #fff2}.node.completed,.node.accepted,.node.selected{border-color:#6d8870}.node.failed,.node.rejected{border-color:#995d5d}.nlabel{font-size:16px}.nsub{font-size:12px;color:var(--muted);text-transform:uppercase;margin-top:10px}.edges{position:absolute;inset:0;pointer-events:none}.legend{position:absolute;right:24px;bottom:20px;border:1px solid var(--line);border-radius:10px;padding:14px 20px;background:#081014;display:flex;gap:18px;color:var(--muted)}.final{margin-top:14px;padding:14px;border:1px solid var(--line);border-radius:10px;background:#071015;white-space:pre-wrap}.empty{color:var(--muted);padding:30px;text-align:center}@media(max-width:1100px){.cards,.grid{grid-template-columns:1fr}.panel{min-height:0}.graph{height:700px}}
</style></head><body><div class="wrap"><div class="top"><div class="brand"><i class="v"></i>Villani Ops <span id="live" class="badge">OFFLINE</span></div><div class="actions"><div class="progress">Run Progress <span></span><b id="pct">—</b></div><button class="btn" onclick="window.location.href='.'">Open in Console ↗</button></div></div><div class="cards" id="cards"></div><div class="grid"><section class="panel"><h2>Live Event Timeline</h2><div class="sub">Real-time orchestration events</div><div class="timeline" id="timeline"></div><div id="final" class="final" style="display:none"></div></section><section class="panel"><h2>Execution Graph</h2><div class="sub">Live view of orchestration flow</div><div class="graph" id="graph"><svg class="edges" id="edges"></svg></div><div class="legend"><span>● Completed</span><span>○ In Progress</span><span>◌ Pending</span><span class="green">● Live Updates</span></div></section></div></div><script>
const embedded=document.getElementById('villani-run-snapshot');let snapshot=embedded&&embedded.textContent.trim()?JSON.parse(embedded.textContent):null;let live=!snapshot;const $=id=>document.getElementById(id);function fmt(n){return n?Number(n).toLocaleString():'—'}function money(n){return n?('$'+Number(n).toFixed(4)):'—'}function dur(s){if(s==null)return '—';s=Math.round(s);return String(Math.floor(s/3600)).padStart(2,'0')+':'+String(Math.floor(s/60)%60).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}function time(t){try{return new Date(t).toLocaleTimeString()}catch(e){return '—'}}function esc(s){return String(s??'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function render(s){snapshot=s||snapshot||{};let r=snapshot.run||{},u=snapshot.usage||{};$('live').textContent=live&&r.status!='completed'&&r.status!='failed'?'LIVE':'OFFLINE SNAPSHOT';$('live').className='badge '+($('live').textContent=='LIVE'?'green':'');$('pct').textContent=(r.status=='completed'||r.status=='failed')?'100%':'68%';let cards=[['Task',r.task||'—',r.mode||''],['Model',r.model||'—',''],['Runner',r.runner||'—',''],['Tokens',fmt(u.total_tokens),`${fmt(u.input_tokens)} input / ${fmt(u.output_tokens)} output`],['Cost (USD)',money(u.total_cost),`${u.unavailable_calls_count||0} unavailable calls`],['Status',r.status||'unknown',''],['Duration',dur(r.duration_seconds),r.started_at?('Started '+time(r.started_at)):''],['Run ID',r.run_id||'—',r.run_dir||'']];$('cards').innerHTML=cards.map(c=>`<div class="card"><div class="label">${esc(c[0])}</div><div class="value ${c[0]=='Status'?'green':''}">${esc(c[1])}</div><div class="sub">${esc(c[2])}</div></div>`).join('');let tl=snapshot.timeline||[];$('timeline').innerHTML=tl.length?tl.map(e=>`<div class="event"><div class="time">${time(e.timestamp)}</div><div class="dot ${e.status}"></div><div class="eventbox ${e.status=='running'?'active':''}"><div><div class="etype">${esc(e.title)}</div><div class="sub">${esc(e.subtitle)}</div></div><div class="green">${e.duration_seconds?e.duration_seconds+'s':'—'}</div></div></div>`).join(''):'<div class="empty">No events yet</div>';if(r.result){$('final').style.display='block';$('final').textContent='Final result\n'+JSON.stringify(r.result,null,2)}renderGraph(snapshot.graph||{nodes:[],edges:[]})}
function renderGraph(g){const graph=$('graph'),svg=$('edges');graph.querySelectorAll('.node').forEach(n=>n.remove());let base={investigate:[25,40],classify:[235,40],plan:[465,40],select_path:[675,40],validate:[190,330],review:[410,330],winner:[620,330],finalize:[825,330]};let mid=0;(g.nodes||[]).forEach(n=>{if(!base[n.id]&&(n.type=='candidate'||n.type=='subtask'))base[n.id]=[205+(mid++%3)*205,185+Math.floor((mid-1)/3)*110]});(g.nodes||[]).forEach(n=>{let p=base[n.id]||[30,30];let d=document.createElement('div');d.className='node '+(n.status||'pending');d.style.left=p[0]+'px';d.style.top=p[1]+'px';d.dataset.id=n.id;d.innerHTML=`<div class="nlabel">${esc(n.label||n.id)}</div><div class="nsub">${esc(n.subtitle||n.status||'')}</div>`;graph.appendChild(d)});setTimeout(()=>{let box=graph.getBoundingClientRect();svg.setAttribute('width',box.width);svg.setAttribute('height',box.height);svg.innerHTML=(g.edges||[]).map(e=>{let a=graph.querySelector(`[data-id="${CSS.escape(e.source)}"]`),b=graph.querySelector(`[data-id="${CSS.escape(e.target)}"]`);if(!a||!b)return '';let ar=a.getBoundingClientRect(),br=b.getBoundingClientRect(),x1=ar.right-box.left,y1=ar.top+ar.height/2-box.top,x2=br.left-box.left,y2=br.top+br.height/2-box.top;return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#9aa3a8" stroke-width="1.5"/>`}).join('')},0)}
async function poll(){if(!live)return;let m=location.pathname.match(/\/runs\/([^/]+)/);if(!m)return;try{let r=await fetch(`/api/runs/${m[1]}/snapshot`,{cache:'no-store'});if(r.ok)render(await r.json())}catch(e){}setTimeout(poll,1000)}if(snapshot)render(snapshot);else poll();
</script></body></html>
